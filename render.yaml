services:
  - type: web
    name: profitpilot-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: profitpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: profitpilot-redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_REDIRECT_URI
        sync: false

  - type: worker
    name: profitpilot-worker
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: profitpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: profitpilot-redis
          property: connectionString

databases:
  - name: profitpilot-db
    plan: starter
    databaseName: profitpilot
    user: profitpilot

  - name: profitpilot-redis
    type: redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
